<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murder Mystery Card Game</title>
  
  <!-- โหลด Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- โหลด Lottie สำหรับแอนิเมชันหน้าแรก -->
  <script type="module" src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js"></script>

  <!-- โหลด Babel เพื่อแปลงโค้ด React ในบราวเซอร์ -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* เอฟเฟกต์แสงไฟส่อง (Spotlight) */
    .spotlight-overlay {
      background: radial-gradient(circle at 50% 50%, transparent 5%, rgba(0,0,0,0.92) 35%, rgba(0,0,0,1) 100%);
      pointer-events: none;
    }

    /* เอฟเฟกต์ไฟหรี่สำรวจ (Iris Effect) */
    .iris-dimmer {
      position: fixed;
      inset: 0;
      z-index: 40;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out;
      opacity: 0;
    }
    .iris-active { opacity: 1; }

    /* อนิเมชันตัวละครเดินออกมา */
    @keyframes walkFromSide {
      0% { transform: translateX(-150%) scale(0.9); opacity: 0; }
      100% { transform: translateX(0) scale(1); opacity: 1; }
    }
    .animate-walk-in { animation: walkFromSide 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    /* อนิเมชันไฟดับ (Blackout) */
    .blackout-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 100;
      pointer-events: none;
    }

    /* อนิเมชันเปิดไฟ (Lights On) */
    @keyframes lightsOn {
      0% { opacity: 0; filter: brightness(0); }
      100% { opacity: 1; filter: brightness(1); }
    }
    .animate-lights-on { animation: lightsOn 1s ease-out forwards; }
    
    /* ซ่อน scrollbar แต่ยังคงเลื่อนได้ */
    ::-webkit-scrollbar { display: none; }
    body { 
      -ms-overflow-style: none; 
      scrollbar-width: none; 
      overflow-x: hidden; 
      touch-action: manipulation; 
    }
    .crisp-image { image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; }

    /* อนิเมชันสับไพ่ */
    @keyframes shuffle-h1 { 0%, 100% { transform: translateX(0); z-index: 30; } 50% { transform: translateX(-130px); z-index: 10; } }
    @keyframes shuffle-h2 { 0%, 100% { transform: translateX(0); z-index: 10; } 50% { transform: translateX(130px); z-index: 30; } }
    .animate-shuffle-1 { animation: shuffle-h1 0.8s infinite ease-in-out; }
    .animate-shuffle-2 { animation: shuffle-h2 0.8s infinite ease-in-out 0.15s; }

    .typing-effect { overflow: hidden; white-space: normal; animation: typing 3.5s steps(40, end); }
    @keyframes typing { from { max-height: 0; opacity: 0; } to { max-height: 500px; opacity: 1; } }
  </style>
</head>
<body class="bg-[#050505] text-white">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot, collection } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const apiKey = ""; 
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : {
          apiKey: "AIzaSyALJV_LhnYDU01M7DtFnDQnByscqf_ECD8",
          authDomain: "fbi52-d8df3.firebaseapp.com",
          projectId: "fbi52-d8df3",
          storageBucket: "fbi52-d8df3.firebasestorage.app",
          messagingSenderId: "945159237123",
          appId: "1:945159237123:web:1539c68592a057d9c1e836",
          measurementId: "G-7TNTTKBJ5R"
        };

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'murder-mystery-game';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- อัปเดต ROLE_TEMPLATES ปรับชาวบ้านเหลือ 2 ผู้ต้องสงสัยปกติเป็น 4 (รวม 20 ใบ) ---
    const ROLE_TEMPLATES = [
      { role: 'ผู้ต้องสงสัย (ปกติ)', count: 4, color: 'bg-red-950', text: 'text-red-100', image: 'https://i.postimg.cc/13C0xyqj/freepik_the_style_is_rich_with_textured_brushstrokes_deep_53311.png', skill: 'การพรางตัว (ห้ามเผยตัวตน): ต้องคอยปลอมตัวเป็นบทบาทอื่นๆ หรือทำตัวให้แนบเนียนเป็นคนปกติมากที่สุดเพื่อหลีกเลี่ยงการถูกสงสัย', story: 'คุณอยู่ในที่เกิดเหตุและมีแรงจูงใจที่จะฆ่าผู้ตาย แต่คุณยังปากแข็งว่าตัวเองบริสุทธิ์...' },
      { role: 'ผู้ร้ายตัวจริง', count: 1, color: 'bg-red-950', text: 'text-red-100', image: 'https://i.postimg.cc/rpNqWNR1/creation_2471383431.png', skill: 'เลือดต้องสาป (ห้ามเผยตัวตน): เลือดของคุณคือกรุ๊ป A- ต้องปลอมตัวเป็นบทบาทอื่นอย่างสมบูรณ์แบบและห้ามถูกจับได้เด็ดขาด', story: 'คุณคือผู้ลงมือตัวจริง ความเย็นชาในสายเลือดทำให้คุณกล้าทำในสิ่งที่คนอื่นไม่กล้า... และจะไม่ยอมให้ใครลากตัวไปลงโทษ' },
      { role: 'ผู้สมรู้ร่วมคิด', count: 1, color: 'bg-red-950', text: 'text-red-100', image: 'https://i.postimg.cc/2S8dX1Vt/freepik_the_style_is_rich_with_textured_brushstrokes_deep_53310.png', skill: 'ปั่นประสาท (ห้ามเผยตัวตน): เลือดของคุณคือกรุ๊ป B ทำหน้าที่สร้างความสับสน ปลอมบทบาท และทำตัวให้น่าสงสัยเพื่อดึงความสนใจแทนผู้ร้าย', story: 'คุณไม่ได้ฆ่า แต่ได้รับผลประโยชน์จากความตายครั้งนี้ หน้าที่ของคุณคือการเล่นละครตบตาให้นักสืบหลงทาง' },
      { role: 'เทคนิคการแพทย์', count: 5, color: 'bg-cyan-950', text: 'text-cyan-100', image: 'https://i.postimg.cc/vHwXJfZt/freepik-the-style_is_rich_with_textured_brushstrokes_deep_40003.jpg', skill: 'วิเคราะห์ผลเลือด (เผยตัวตนได้): ตรวจเลือดเป้าหมายได้ ข้อจำกัด: ห้ามบอกคำตอบตรงๆ ต้องบอกเป็น "การตกตะกอนของหมู่เลือด" เท่านั้น', story: 'คุณเชี่ยวชาญการพิสูจน์หลักฐานทางวิทยาศาสตร์และร่องรอยเล็กๆ ที่สายตาคนธรรมดามองไม่เห็น' },
      { role: 'นักสืบ', count: 4, color: 'bg-blue-950', text: 'text-blue-100', image: 'https://i.postimg.cc/tgN9PNnT/creation_2471387094.jpg', skill: 'สืบหาเบาะแส (ห้ามเผยตัวตน): ตรวจสอบร่องรอยเลือดของผู้ตาย/ผู้ต้องสงสัย ข้อจำกัด: ห้ามแสดงความคิดเห็นกับผู้เล่นอื่น ยกเว้นคุยกับเทคนิคการแพทย์แบบลับๆ', story: 'คุณถูกจ้างมาไขคดีนี้ หน้าที่คือปะติดปะต่อเรื่องราวและลากคอฆาตกรตัวจริงเข้าคุก' },
      { role: 'ผู้เห็นเหตุการณ์', count: 3, color: 'bg-amber-950', text: 'text-amber-100', image: 'https://i.postimg.cc/vmtG9txW/creation_2471389788.png', skill: 'พยานปากเอก (เผยตัวตนได้): รู้ว่าคนร้ายเลือดกรุ๊ปอะไร ข้อจำกัด: ห้ามพูด ทำได้แค่พยักหน้าเท่านั้น และตอบคำถามจากผู้อื่นได้ 1 คำถามต่อการประชุม 1 ครั้ง (ตอบเป็นการพยักหน้า ใช่หรือไม่)', story: 'คุณแอบเห็นเหตุการณ์บางอย่างในคืนนั้น แต่คุณกลัวเกินกว่าจะพูดออกไปตรงๆ' },
      { role: 'ชาวบ้าน', count: 2, color: 'bg-emerald-950', text: 'text-emerald-100', image: 'https://i.postimg.cc/fbfMXfSq/creation_2471392365.png', skill: 'พลังมวลชน (ห้ามเผยตัวตน): หากชาวบ้านโหวตพร้อมกัน 3 คน จะสามารถบังคับให้ผู้ต้องสงสัย 1 คนเปิดไพ่ได้', story: 'คุณแค่คนธรรมดาที่ดันซวยเข้ามาพัวพันกับคดี สิ่งเดียวที่คุณทำได้คือจับผิดคนให้ถูก' }
    ];

    const TOTAL_CARDS = 20;

    // แก้ไขข้อผิดพลาด Syntax Error ในส่วนนี้
    const secureRandom = () => {
      const array = new Uint32Array(1);
      window.crypto.getRandomValues(array);
      return array[0] / (0xFFFFFFFF + 1);
    };

    const shuffleArray = (array) => {
      const shuffled = [...array];
      for (let pass = 0; pass < 3; pass++) {
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(secureRandom() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
      }
      return shuffled;
    };

    const generateDeck = () => {
      let deck = [];
      const templates = shuffleArray([...ROLE_TEMPLATES]);
      templates.forEach(template => {
        for (let i = 0; i < template.count; i++) {
          deck.push({ ...template, isDrawn: false, drawnBy: null });
        }
      });
      return shuffleArray(deck).map((card, index) => ({ ...card, id: index }));
    };

    const BACKGROUND_IMAGE_URL = 'https://i.postimg.cc/XJkQcpnX/freepik_the_style_is_rich_with_textured_brushstrokes_deep_40002.jpg';
    const CARD_BACK_IMAGE_URL = 'https://i.postimg.cc/yNy79y33/creation_2471378801.png'; 

    function App() {
      const [user, setUser] = useState(null);
      const [gameState, setGameState] = useState(null);
      const [loading, setLoading] = useState(true);
      const [introStage, setIntroStage] = useState('arrival'); 
      const [hasEntered, setHasEntered] = useState(false); 
      const [isShuffling, setIsShuffling] = useState(false);
      const [isFlipping, setIsFlipping] = useState(false);
      const [isDimming, setIsDimming] = useState(false); 
      const [justDrawn, setJustDrawn] = useState(false);
      const [spotlightPos, setSpotlightPos] = useState({ x: 50, y: 50 });
      const [aiInsight, setAiInsight] = useState("");
      const [isGeneratingAI, setIsGeneratingAI] = useState(false);
      const [aiError, setAiError] = useState("");

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else { await signInAnonymously(auth); }
          } catch (error) { console.error("Auth Error:", error); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', 'room-01');
        const unsubscribe = onSnapshot(gameDocRef, (docSnap) => {
          if (docSnap.exists()) { setGameState(docSnap.data()); setLoading(false); }
          else { resetGame(); }
        });
        return () => unsubscribe();
      }, [user]);

      useEffect(() => {
        if (introStage === 'arrival') {
          const timer = setTimeout(() => setIntroStage('blackout'), 3200);
          return () => clearTimeout(timer);
        } else if (introStage === 'blackout') {
          const timer = setTimeout(() => setIntroStage('ready'), 1000);
          return () => clearTimeout(timer);
        }
      }, [introStage]);

      useEffect(() => {
        const handleMove = (e) => {
          const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
          const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
          setSpotlightPos({ x: (clientX / window.innerWidth) * 100, y: (clientY / window.innerHeight) * 100 });
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, { passive: true });
        window.addEventListener('touchstart', handleMove, { passive: true });
        return () => { 
          window.removeEventListener('mousemove', handleMove); 
          window.removeEventListener('touchmove', handleMove);
          window.removeEventListener('touchstart', handleMove);
        };
      }, []);

      const fetchAIInsight = async (role, story) => {
        if (isGeneratingAI) return;
        setIsGeneratingAI(true); setAiError(""); setAiInsight("");
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: `บทบาท: ${role}\nเรื่องราว: ${story}\nช่วยวิเคราะห์จิตวิทยาและวิธีเล่นบทบาทนี้ให้เนียนที่สุดในฐานะผู้คุมเกมสไตล์ Noir` }] }], systemInstruction: { parts: [{ text: "วิเคราะห์จิตวิทยาตัวละครสั้นๆ ภาษาไทย" }] } })
          });
          const result = await response.json();
          setAiInsight(result.candidates?.[0]?.content?.parts?.[0]?.text || "ข้อมูลสูญหาย...");
        } catch (err) { setAiError("สัญญาณขัดข้อง..."); }
        finally { setIsGeneratingAI(false); }
      };

      const resetGame = async () => {
        if (!user) return;
        setLoading(true);
        const deck = ROLE_TEMPLATES.flatMap(t => Array(t.count).fill(0).map(() => ({...t, isDrawn: false, drawnBy: null})));
        for (let i = deck.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; }
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', 'room-01'), { cards: deck.map((c, i) => ({...c, id: i})), createdAt: new Date().toISOString() });
        setIsFlipping(false); setIsDimming(false); setJustDrawn(false); setAiInsight(""); setLoading(false);
      };

      const handleDrawWithAnimation = async () => {
        if (!user || !gameState || isShuffling) return;
        setIsShuffling(true);
        setTimeout(async () => {
          const idx = gameState.cards.findIndex(c => !c.isDrawn);
          if (idx === -1) { setIsShuffling(false); return; }
          const updated = [...gameState.cards]; updated[idx].isDrawn = true; updated[idx].drawnBy = user.uid;
          setJustDrawn(true); setIsShuffling(false);
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', 'room-01'), { ...gameState, cards: updated }, { merge: true });
        }, 2500);
      };

      const myCard = useMemo(() => gameState?.cards.find(c => c.drawnBy === user?.uid), [gameState, user]);
      const stats = useMemo(() => ({ drawn: gameState?.cards.filter(c => c.isDrawn).length || 0, left: TOTAL_CARDS - (gameState?.cards.filter(c => c.isDrawn).length || 0) }), [gameState]);

      if (!hasEntered) {
        return (
          <div className="min-h-screen relative flex flex-col items-center justify-center overflow-hidden bg-black">
            {introStage === 'arrival' && (
              <div className="relative flex flex-col items-center">
                <div className="absolute inset-0 spotlight-overlay z-10"></div>
                <div className="relative z-20 animate-walk-in" style={{ height: '480px' }}>
                  <div style={{ width: '2500px', height: '2500px', position: 'absolute', transform: 'scale(0.192)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <dotlottie-wc src="https://lottie.host/5d8c780d-347d-49b3-a0e0-397b051a0f02/8vwgaQzguI.lottie" style={{ width: '100%', height: '100%' }} autoplay loop></dotlottie-wc>
                  </div>
                </div>
              </div>
            )}
            {introStage === 'blackout' && <div className="blackout-screen"></div>}
            {introStage === 'ready' && (
              <div className="w-full h-full flex flex-col items-center justify-center animate-lights-on p-4"
                   style={{ backgroundImage: `url("https://i.postimg.cc/XJkQcpnX/freepik_the_style_is_rich_with_textured_brushstrokes_deep_40002.jpg")`, backgroundSize: 'cover', width: '100vw', height: '100vh' }}>
                <div className="absolute inset-0 bg-black/60"></div>
                <div className="relative z-10 text-center max-w-lg">
                  <h1 className="text-5xl md:text-7xl font-black text-red-600 mb-2 tracking-[0.25em] drop-shadow-[0_0_25px_rgba(220,38,38,0.8)]">MURDER MYSTERY</h1>
                  <p className="text-gray-400 mb-12 font-mono text-sm tracking-[0.5em] uppercase">Criminal Archive #9942</p>
                  <button onClick={() => setHasEntered(true)} disabled={loading} className="group relative w-full overflow-hidden rounded-full p-[3px] active:scale-95 shadow-[0_0_40px_rgba(220,38,38,0.25)]">
                    <div className="absolute inset-0 bg-gradient-to-r from-red-600 via-red-900 to-red-600 animate-pulse"></div>
                    <div className="relative bg-[#050505] rounded-full px-12 py-5 transition-all group-hover:bg-transparent">
                      <span className="text-white text-xl font-bold tracking-[0.4em] uppercase">{loading ? 'DECRYPTING...' : '🕵️‍♂️ INVESTIGATE'}</span>
                    </div>
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="min-h-screen relative font-sans p-4 md:p-8 flex flex-col items-center" 
             style={{backgroundImage: `url("https://i.postimg.cc/XJkQcpnX/freepik_the_style_is_rich_with_textured_brushstrokes_deep_40002.jpg")`, backgroundSize: 'cover', backgroundAttachment: 'fixed'}}>
          
          <div className={`iris-dimmer ${isDimming ? 'iris-active' : ''}`} style={{ background: `radial-gradient(circle at ${spotlightPos.x}% ${spotlightPos.y}%, transparent 0%, rgba(0,0,0,0.95) 45%, rgba(0,0,0,1) 100%)`, transition: 'opacity 1.5s, background 0.15s' }}></div>

          <div className="max-w-3xl w-full mx-auto space-y-6 relative z-20 flex-1 flex flex-col pb-20">
            <div className={`bg-black/85 p-5 rounded-2xl border-t-4 border-red-900 shadow-[0_10px_40px_rgba(0,0,0,0.8)] transition-opacity duration-1000 ${isDimming ? 'opacity-30' : 'opacity-100'}`}>
              <div className="flex flex-col sm:flex-row justify-between items-center">
                <div className="text-center sm:text-left">
                  <h2 className="text-gray-100 text-xl font-black tracking-widest flex items-center gap-3"><span className="text-red-600 animate-pulse">🩸</span> CASE STATUS</h2>
                  <p className="text-gray-400 text-sm font-mono mt-1 uppercase">Processed: {stats.drawn} | Remaining: {stats.left}</p>
                </div>
                <button onClick={resetGame} className="mt-4 sm:mt-0 text-xs font-bold tracking-widest bg-gray-900 hover:bg-red-950 border border-gray-700 px-5 py-2.5 rounded-full uppercase">Reset Archive</button>
              </div>
            </div>

            <div className="flex-1 flex flex-col items-center justify-center py-6">
              {!myCard ? (
                <div className="flex flex-col items-center">
                  {isShuffling ? (
                    <div className="relative w-48 h-64 mb-10 flex items-center justify-center">
                      <div className="absolute inset-0 bg-[#2a1b0d] rounded-2xl border-2 border-[#5c4a38] shadow-2xl animate-shuffle-1 overflow-hidden crisp-image" style={{backgroundImage: `url("https://i.postimg.cc/yNy79y33/creation_2471378801.png")`, backgroundSize: 'cover'}}></div>
                      <div className="absolute inset-0 bg-[#2a1b0d] rounded-2xl border-2 border-[#5c4a38] shadow-2xl animate-shuffle-2 overflow-hidden crisp-image" style={{backgroundImage: `url("https://i.postimg.cc/yNy79y33/creation_2471378801.png")`, backgroundSize: 'cover'}}></div>
                      <div className="absolute z-20 text-white font-black text-[10px] tracking-[0.2em] bg-red-800/90 px-3 py-1.5 rounded uppercase border border-red-500/30">Analyzing...</div>
                    </div>
                  ) : (
                    <div className="w-28 h-28 bg-black rounded-full border-4 border-gray-800 flex items-center justify-center shadow-[0_0_50px_rgba(220,38,38,0.25)] mb-10 overflow-hidden group">
                      <div className="absolute inset-0 bg-red-600/10 animate-pulse"></div><span className="text-6xl group-hover:scale-110 transition-transform">💉</span>
                    </div>
                  )}
                  <button onClick={handleDrawWithAnimation} disabled={stats.left === 0 || isShuffling} className="group relative bg-red-900 hover:bg-red-700 disabled:bg-gray-900 text-white px-10 py-6 rounded-3xl text-2xl font-black tracking-[0.2em] shadow-[0_10px_0_#4a0000] active:translate-y-2 transition-all border border-red-500 uppercase flex flex-col items-center">
                    <span>{isShuffling ? 'In Progress...' : 'Scan Blood'}</span>
                    <span className="text-[10px] font-mono tracking-widest text-red-300 mt-2">(Biometric Scan)</span>
                  </button>
                </div>
              ) : (
                <div className="flex flex-col items-center w-full max-w-sm mx-auto relative">
                  <div className={`perspective-1000 w-full px-6 z-50 ${justDrawn ? 'animate-shoot' : ''}`}>
                    <div onClick={() => { if(!isFlipping) { setIsDimming(true); setTimeout(() => setIsFlipping(true), 1000); } }} 
                         className={`relative w-full aspect-[2/3] transform-style-3d transition-all duration-[2500ms] ease-[cubic-bezier(0.4,0,0.2,1)] ${isFlipping ? 'rotate-y-180' : 'cursor-pointer hover:scale-[1.03]'}`}>
                      <div className="absolute inset-0 w-full h-full backface-hidden rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.9)] border-2 border-[#5c4a38] bg-[#2a1b0d] flex flex-col items-center justify-center p-1 bg-cover bg-center overflow-hidden crisp-image" style={{ backgroundImage: `url("https://i.postimg.cc/yNy79y33/creation_2471378801.png")` }}>
                        <div className="w-full h-full border border-white/5 flex flex-col items-center justify-center bg-black/35 backdrop-blur-[1px] rounded-xl p-3 text-center">
                          <div className="w-16 h-16 bg-black/40 rounded-full flex items-center justify-center mb-3 border border-white/10"><span className="text-4xl opacity-90 drop-shadow-lg">🩸</span></div>
                          <span className="text-base font-mono text-white font-black tracking-[0.3em] uppercase">Top Secret</span>
                          {!isFlipping && !isDimming && <span className="mt-10 bg-red-600/80 text-white px-5 py-1.5 rounded-full text-[10px] font-bold animate-pulse border border-white/20 tracking-[0.2em] uppercase text-center">Tap to Reveal</span>}
                        </div>
                      </div>
                      <div className={`absolute inset-0 w-full h-full backface-hidden rotate-y-180 rounded-2xl shadow-[0_0_60px_rgba(255,255,255,0.1)] border-4 flex flex-col overflow-hidden crisp-image ${myCard.color} border-[#0a0a0a] bg-cover bg-center`} style={{ backgroundImage: `url("${myCard.image}")` }}>
                        <div className="bg-white/95 text-black text-[10px] font-mono font-black text-center py-2.5 border-b-4 border-black tracking-[0.4em] z-10 uppercase">Identity Confirmed</div>
                        <div className="flex-1 flex flex-col items-end justify-end p-5 text-right bg-gradient-to-t from-black/90 via-black/30 to-transparent z-10">
                          <h3 className={`font-black text-3xl z-10 ${myCard.text} drop-shadow-[0_2px_4px_rgba(0,0,0,1)] tracking-wider uppercase`}>{myCard.role}</h3>
                          <div className="mt-3 text-[10px] font-mono text-white/90 bg-red-900/60 px-4 py-1.5 rounded-sm border border-red-500/30 backdrop-blur-sm tracking-widest uppercase">ID: #{myCard.drawnBy?.substring(0,8)}</div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {isFlipping && (
                    <div className="w-full mt-8 bg-[#f2e5cf] text-gray-900 rounded-xl shadow-[0_15px_35px_rgba(0,0,0,0.6)] border border-[#d4c5ab] p-6 relative animate-slide-up overflow-hidden z-50">
                      <div className="absolute inset-0 overflow-hidden rounded-xl pointer-events-none opacity-60">
                        <div className="absolute top-0 left-[20%] w-2.5 h-12 bg-[#7a0000] rounded-b-full mix-blend-multiply"></div>
                        <div className="absolute top-10 left-[20.2%] w-2 h-2.5 bg-[#7a0000] rounded-full mix-blend-multiply animate-blood-drop-1"></div>
                      </div>
                      <div className="relative z-10">
                        <div className="flex items-center gap-3 border-b-2 border-red-900/20 pb-3 mb-5">
                          <div className="p-2 bg-red-900 rounded-lg text-white shadow-lg"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>
                          <h4 className="font-black text-red-950 font-mono tracking-widest uppercase text-lg text-center flex-1">Case Dossier</h4>
                        </div>
                        <div className="space-y-5">
                          <div className="bg-white/40 p-4 rounded-lg border border-white/20">
                            <span className="block text-[10px] font-black text-red-900 uppercase tracking-[0.25em] mb-2 font-mono">Confidential Profile</span>
                            <p className="text-base leading-relaxed font-serif text-gray-800 italic font-medium">"{myCard.story}"</p>
                          </div>
                          <div className="bg-red-900/10 rounded-lg p-4 border border-red-900/20 shadow-inner">
                            <span className="block text-[10px] font-black text-red-700 uppercase tracking-[0.25em] mb-2 font-mono">Designated Skill</span>
                            <p className="text-base font-bold text-gray-900 leading-snug">{myCard.skill}</p>
                          </div>
                          <div className="mt-6 pt-4 border-t border-red-900/10 text-center">
                            {!aiInsight && !isGeneratingAI && !aiError && (
                              <button onClick={() => fetchAIInsight(myCard.role, myCard.story)} className="w-full bg-red-950 hover:bg-red-900 text-red-100 py-3 rounded-lg border border-red-500/30 flex items-center justify-center gap-2 group active:scale-95 shadow-md">
                                <span className="group-hover:animate-spin">✨</span><span className="font-bold text-xs tracking-widest uppercase text-[10px]">วิเคราะห์ประวัติเชิงลึก</span>
                              </button>
                            )}
                            {isGeneratingAI && <div className="flex flex-col items-center gap-2 py-4 animate-pulse"><div className="flex gap-1"><div className="w-2 h-2 bg-red-900 rounded-full animate-bounce"></div><div className="w-2 h-2 bg-red-900 rounded-full animate-bounce [animation-delay:-.3s]"></div><div className="w-2 h-2 bg-red-900 rounded-full animate-bounce [animation-delay:-.5s]"></div></div><span className="text-[10px] font-mono text-red-900 uppercase tracking-widest">กำลังดึงข้อมูล...</span></div>}
                            {aiInsight && <div className="bg-black/5 p-4 rounded border border-red-900/5 mt-2 animate-fadeIn relative text-left"><div className="absolute top-2 right-2 text-red-900/20 text-xl">✨</div><span className="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 font-mono">Psychological Evaluation</span><p className="text-sm text-gray-700 font-serif italic leading-relaxed typing-effect">{aiInsight}</p></div>}
                            {aiError && <p className="text-[10px] text-red-700 text-center font-mono mt-2">{aiError}</p>}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
