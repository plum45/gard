<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murder Mystery Card Game</title>

  <!-- โหลด Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- โหลด Lottie สำหรับแอนิเมชันหน้าแรก -->
  <script type="module" src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js"></script>

  <!-- โหลด Babel เพื่อแปลงโค้ด React ในบราวเซอร์ -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* เอฟเฟกต์แสงไฟส่อง (Spotlight) */
    .spotlight-overlay {
      background: radial-gradient(circle at 50% 50%, transparent 5%, rgba(0, 0, 0, 0.92) 35%, rgba(0, 0, 0, 1) 100%);
      pointer-events: none;
    }

    /* เอฟเฟกต์ไฟหรี่สำรวจ (Iris Effect) */
    .iris-dimmer {
      position: fixed;
      inset: 0;
      z-index: 40;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out;
      opacity: 0;
    }

    .iris-active {
      opacity: 1;
    }

    /* อนิเมชันตัวละครเดินออกมา */
    @keyframes walkFromSide {
      0% {
        transform: translateX(-150%) scale(0.9);
        opacity: 0;
      }

      100% {
        transform: translateX(0) scale(1);
        opacity: 1;
      }
    }

    .animate-walk-in {
      animation: walkFromSide 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* อนิเมชันไฟดับ (Blackout) */
    .blackout-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 100;
      pointer-events: none;
    }

    /* อนิเมชันเปิดไฟ (Lights On) */
    @keyframes lightsOn {
      0% {
        opacity: 0;
        filter: brightness(0);
      }

      100% {
        opacity: 1;
        filter: brightness(1);
      }
    }

    .animate-lights-on {
      animation: lightsOn 1s ease-out forwards;
    }

    /* ซ่อน scrollbar แต่ยังคงเลื่อนได้ */
    ::-webkit-scrollbar {
      display: none;
    }

    body {
      -ms-overflow-style: none;
      scrollbar-width: none;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    .crisp-image {
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* อนิเมชันสับไพ่ */
    @keyframes shuffle-h1 {

      0%,
      100% {
        transform: translateX(0);
        z-index: 30;
      }

      50% {
        transform: translateX(-130px);
        z-index: 10;
      }
    }

    @keyframes shuffle-h2 {

      0%,
      100% {
        transform: translateX(0);
        z-index: 10;
      }

      50% {
        transform: translateX(130px);
        z-index: 30;
      }
    }

    .animate-shuffle-1 {
      animation: shuffle-h1 0.8s infinite ease-in-out;
    }

    .animate-shuffle-2 {
      animation: shuffle-h2 0.8s infinite ease-in-out 0.15s;
    }

    .typing-effect {
      overflow: hidden;
      white-space: normal;
      animation: typing 3.5s steps(40, end);
    }

    @keyframes typing {
      from {
        max-height: 0;
        opacity: 0;
      }

      to {
        max-height: 500px;
        opacity: 1;
      }
    }

    /* Toast notification สำหรับแจ้งเตือน error */
    @keyframes slideDown {
      0% {
        transform: translateX(-50%) translateY(-120%);
        opacity: 0;
      }

      100% {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    @keyframes slideUp {
      0% {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      100% {
        transform: translateX(-50%) translateY(-120%);
        opacity: 0;
      }
    }

    .toast-enter {
      animation: slideDown 0.4s ease-out forwards;
    }

    .toast-exit {
      animation: slideUp 0.3s ease-in forwards;
    }

    /* ===== 🩸 Blood Drip Effect ===== */
    @keyframes bloodDrip {
      0% {
        transform: translateY(-20px);
        opacity: 0;
        height: 0;
      }

      10% {
        opacity: 1;
      }

      60% {
        height: var(--drip-h, 80px);
      }

      85% {
        opacity: 1;
        height: var(--drip-h, 80px);
      }

      100% {
        transform: translateY(105vh);
        opacity: 0;
        height: var(--drip-h, 80px);
      }
    }

    .blood-drip {
      position: fixed;
      top: -20px;
      width: 3px;
      z-index: 60;
      background: linear-gradient(to bottom, #4a0000, #8b0000, #ff000080, transparent);
      border-radius: 0 0 50% 50%;
      pointer-events: none;
      animation: bloodDrip var(--dur, 6s) var(--delay, 0s) ease-in infinite;
    }

    /* ===== 🌫️ Fog / Smoke Effect ===== */
    @keyframes fogDrift {
      0% {
        transform: translateX(-10%) scaleY(1);
        opacity: 0.15;
      }

      50% {
        transform: translateX(5%) scaleY(1.1);
        opacity: 0.25;
      }

      100% {
        transform: translateX(-10%) scaleY(1);
        opacity: 0.15;
      }
    }

    .fog-layer {
      position: fixed;
      bottom: 0;
      left: -10%;
      width: 120%;
      pointer-events: none;
      z-index: 10;
      background: linear-gradient(to top, rgba(30, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.15) 40%, transparent 100%);
      animation: fogDrift var(--fog-dur, 12s) ease-in-out infinite;
    }

    /* ===== 💀 Glitch Text Effect ===== */
    @keyframes glitch1 {

      0%,
      90%,
      100% {
        clip-path: inset(0 0 0 0);
        transform: translate(0);
      }

      92% {
        clip-path: inset(40% 0 20% 0);
        transform: translate(-4px, 2px);
      }

      94% {
        clip-path: inset(10% 0 60% 0);
        transform: translate(4px, -2px);
      }

      96% {
        clip-path: inset(60% 0 5% 0);
        transform: translate(-2px, 1px);
      }

      98% {
        clip-path: inset(20% 0 40% 0);
        transform: translate(3px, -1px);
      }
    }

    @keyframes glitch2 {

      0%,
      88%,
      100% {
        clip-path: inset(0 0 0 0);
        transform: translate(0);
        opacity: 0;
      }

      90% {
        clip-path: inset(50% 0 10% 0);
        transform: translate(5px, -3px);
        opacity: 0.7;
      }

      93% {
        clip-path: inset(15% 0 55% 0);
        transform: translate(-5px, 3px);
        opacity: 0.7;
      }

      96% {
        clip-path: inset(70% 0 5% 0);
        transform: translate(3px, -2px);
        opacity: 0.7;
      }
    }

    .glitch-text {
      position: relative;
      animation: glitch1 4s infinite linear;
    }

    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff0000;
      opacity: 0;
      animation: glitch2 4s infinite linear 0.05s;
    }

    /* ===== 🃏 Card Float (Idle hover) ===== */
    @keyframes cardFloat {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      25% {
        transform: translateY(-8px) rotate(0.5deg);
      }

      75% {
        transform: translateY(4px) rotate(-0.3deg);
      }
    }

    .card-float {
      animation: cardFloat 4s ease-in-out infinite;
    }

    /* ===== ✨ Particle Burst on Reveal ===== */
    @keyframes particleFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(var(--px, 50px), var(--py, -80px)) scale(0);
        opacity: 0;
      }
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 200;
      animation: particleFly var(--p-dur, 1.2s) var(--p-delay, 0s) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* ===== ⚡ Screen Flicker ===== */
    @keyframes screenFlicker {

      0%,
      100% {
        opacity: 1;
      }

      5% {
        opacity: 0.3;
      }

      10% {
        opacity: 1;
      }

      12% {
        opacity: 0.5;
      }

      14% {
        opacity: 1;
      }

      50% {
        opacity: 1;
      }

      52% {
        opacity: 0.2;
      }

      53% {
        opacity: 1;
      }

      80% {
        opacity: 1;
      }

      82% {
        opacity: 0.6;
      }

      83% {
        opacity: 1;
      }
    }

    .screen-flicker {
      animation: screenFlicker 3s ease-in-out 1;
    }

    /* ===== 🔴 Dramatic Glow Pulse ===== */
    @keyframes glowPulse {

      0%,
      100% {
        box-shadow: 0 0 15px rgba(220, 38, 38, 0.3), 0 0 30px rgba(220, 38, 38, 0.1);
      }

      50% {
        box-shadow: 0 0 30px rgba(220, 38, 38, 0.6), 0 0 60px rgba(220, 38, 38, 0.3), 0 0 90px rgba(220, 38, 38, 0.1);
      }
    }

    .glow-pulse {
      animation: glowPulse 2.5s ease-in-out infinite;
    }

    /* ===== 📜 Slide Up Entrance ===== */
    @keyframes slideUpIn {
      0% {
        transform: translateY(60px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slide-up-in {
      animation: slideUpIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ===== 💓 Heartbeat for icons ===== */
    @keyframes heartbeat {

      0%,
      100% {
        transform: scale(1);
      }

      14% {
        transform: scale(1.15);
      }

      28% {
        transform: scale(1);
      }

      42% {
        transform: scale(1.1);
      }

      56% {
        transform: scale(1);
      }
    }

    .heartbeat {
      animation: heartbeat 2s ease-in-out infinite;
    }

    /* ===== 🔦 Scanning Line ===== */
    @keyframes scanLine {
      0% {
        top: -5%;
      }

      100% {
        top: 105%;
      }
    }

    .scan-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 3px;
      z-index: 30;
      background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.6), rgba(255, 50, 50, 0.9), rgba(255, 0, 0, 0.6), transparent);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.5), 0 0 30px rgba(255, 0, 0, 0.2);
      pointer-events: none;
      animation: scanLine 2.5s linear infinite;
    }

    /* ===== 3D Card Hover Utilities ===== */
    .perspective-1000 {
      perspective: 1000px;
    }

    .transform-style-3d {
      transform-style: preserve-3d;
    }

    .backface-hidden {
      backface-visibility: hidden;
    }

    .rotate-y-180 {
      transform: rotateY(180deg);
    }
  </style>
</head>

<body class="bg-[#050505] text-white">

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef, useCallback } from 'https://esm.sh/react@18.2.0';

    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, runTransaction, updateDoc, deleteField } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const apiKey = "";
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

    const firebaseConfig = typeof __firebase_config !== 'undefined'
      ? JSON.parse(__firebase_config)
      : {
        apiKey: "AIzaSyALJV_LhnYDU01M7DtFnDQnByscqf_ECD8",
        authDomain: "fbi52-d8df3.firebaseapp.com",
        projectId: "fbi52-d8df3",
        storageBucket: "fbi52-d8df3.firebasestorage.app",
        messagingSenderId: "945159237123",
        appId: "1:945159237123:web:1539c68592a057d9c1e836",
        measurementId: "G-7TNTTKBJ5R"

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'murder-mystery-game';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ROLE_TEMPLATES = [
      { role: 'ผู้ต้องสงสัย (ปกติ)', count: 3, color: 'bg-red-950', text: 'text-red-100', image: 'https://i.postimg.cc/13C0xyqj/freepik_the_style_is_rich_with_textured_brushstrokes_deep_53311.png', skill: 'การพรางตัว (ห้ามเผยตัวตน): ต้องคอยปลอมตัวเป็นบทบาทอื่นๆ หรือทำตัวให้น่าสนใจมากที่สุด', story: 'คุณอยู่ในที่เกิดเหตุและมีแรงจูงใจที่จะฆ่าผู้ตาย แต่คุณยังปากแข็งว่าตัวเองบริสุทธิ์...' },
      { role: 'ผู้ร้ายตัวจริง', count: 1, color: 'bg-red-950', text: 'text-red-100', image: 'https://i.postimg.cc/rpNqWNR1/creation_2471383431.png', skill: 'เลือดต้องสาป (ห้ามเผยตัวตน): เลือดของคุณคือกรุ๊ป  สามารถฆ่าใครก็ได้ 1 คนในการประชุมครั้งนั้น (เมื่อหลับตา)', story: 'คุณคือผู้ลงมือตัวจริง ความเย็นชาในสายเลือดทำให้คุณกล้าทำในสิ่งที่คนอื่นไม่กล้า... และจะไม่ยอมให้ใครลากตัวไปลงโทษ' },
      { role: 'ผู้สมรู้ร่วมคิด', count: 1, color: 'bg-red-950', text: 'text-red-100', image: 'https://i.postimg.cc/2S8dX1Vt/freepik_the_style_is_rich_with_textured_brushstrokes_deep_53310.png', skill: 'ปั่นประสาท (ห้ามเผยตัวตน): เลือดของคุณคือกรุ๊ป  ทำหน้าที่สร้างความสับสน สามารถสั่งใบ้ใครก็ 1 คนในการประชุม 1 ครั้ง', story: 'คุณไม่ได้ฆ่า แต่ได้รับผลประโยชน์จากความตายครั้งนี้ หน้าที่ของคุณคือการเล่นละครตบตาให้นักสืบหลงทาง' },
      { role: 'เทคนิคการแพทย์', count: 5, color: 'bg-cyan-950', text: 'text-cyan-100', image: 'https://i.postimg.cc/vHwXJfZt/freepik-the-style_is_rich_with_textured_brushstrokes_deep_40003.jpg', skill: 'วิเคราะห์ผลเลือด (เผยตัวตนได้): ตรวจเลือดเป้าหมายได้โดยในการประชุมหนึ่งครั้งสามารถตรวจผลเลือดของคนที่สงสัยได้ ข้อจำกัด: สามารถตรวจได้เพียง 1 คนเท่านั้นต่อการประชุม 1 ครั้ง', story: 'คุณเชี่ยวชาญการพิสูจน์หลักฐานทางวิทยาศาสตร์และร่องรอยเล็กๆ ที่สายตาคนธรรมดามองไม่เห็น' },
      { role: 'นักสืบ', count: 3, color: 'bg-blue-950', text: 'text-blue-100', image: 'https://i.postimg.cc/tgN9PNnT/creation_2471387094.jpg', skill: 'สืบหาเบาะแส (ห้ามเผยตัวตน): ตรวจสอบร่องรอยเลือดของผู้ตาย/ผู้ต้องสงสัย เสริม: สามารถสอบถามรูปพรรณของผู้ร้ายกับผู้ดำเนินเกมได้ 1 ครั้งต่อการประชุม ข้อจำกัด: ไม่สามารถถามได้พร้อมกัน 3 คน นักสืบต้องปรึกษากันว่าใครจะเป็นคนถาม', story: 'คุณถูกจ้างมาไขคดีนี้ หน้าที่คือปะติดปะต่อเรื่องราวและลากคอฆาตกรตัวจริงเข้าคุก' },
      { role: 'ผู้เห็นเหตุการณ์', count: 3, color: 'bg-amber-950', text: 'text-amber-100', image: 'https://i.postimg.cc/vmtG9txW/creation_2471389788.png', skill: 'พยานปากเอก (เผยตัวตนได้): รู้ว่าคนร้ายเลือดกรุ๊ปอะไร ข้อจำกัด: ห้ามพูด ทำได้แค่พยักหน้าเท่านั้น และตอบคำถามจากผู้อื่นได้ 1 คำถามต่อการประชุม 1 ครั้ง', story: 'คุณแอบเห็นเหตุการณ์บางอย่างในคืนนั้น แต่คุณกลัวเกินกว่าจะพูดออกไปตรงๆ' },
      { role: 'ชาวบ้าน', count: 4, color: 'bg-emerald-950', text: 'text-emerald-100', image: 'https://i.postimg.cc/fbfMXfSq/creation_2471392365.png', skill: 'พลังมวลชน (ห้ามเผยตัวตน): หากชาวบ้านโหวตพร้อมกัน 3 คน จะสามารถบังคับให้ผู้ต้องสงสัย 1 คนเปิดไพ่ได้', story: 'คุณแค่คนธรรมดาที่ดันซวยเข้ามาพัวพันกับคดี สิ่งเดียวที่คุณทำได้คือจับผิดคนให้ถูก' }
    ];

    const shuffleArray = (array) => {
      let newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    };

    const generateDeck = (config = null) => {
      let deck = [];
      const templatesConfig = config || ROLE_TEMPLATES;

      const templatesMap = {};
      ROLE_TEMPLATES.forEach(t => templatesMap[t.role] = t);

      const templates = shuffleArray([...templatesConfig]);
      templates.forEach(template => {
        const fullTemplate = templatesMap[template.role];
        if (!fullTemplate) return;

        for (let i = 0; i < template.count; i++) {
          deck.push({ ...fullTemplate, isDrawn: false, drawnBy: null });
        }
      });
      return shuffleArray(deck).map((card, index) => ({ ...card, id: index }));
    };

    const playSound = (type) => {
      try {
        const audios = {
          heartbeat: new Audio('https://www.soundjay.com/human/sounds/heartbeat-01a.mp3'),
          flip: new Audio('https://actions.google.com/sounds/v1/foley/whoosh.ogg'),
          glitch: new Audio('https://actions.google.com/sounds/v1/science_fiction/power_down.ogg')
        };
        if (audios[type]) {
          audios[type].volume = 0.5;
          audios[type].play().catch(e => { });
        }
      } catch (e) { }
    };

    const vibrate = (pattern) => {
      try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) { }
    };

    const BACKGROUND_IMAGE_URL = 'https://i.postimg.cc/XJkQcpnX/freepik_the_style_is_rich_with_textured_brushstrokes_deep_40002.jpg';
    const CARD_BACK_IMAGE_URL = 'https://i.postimg.cc/yNy79y33/creation_2471378801.png';

    // ===== BloodDrips Component =====
    function BloodDrips({ count = 6 }) {
      const drips = useMemo(() => Array.from({ length: count }, (_, i) => ({
        left: `${5 + Math.random() * 90}%`,
        dur: `${5 + Math.random() * 6}s`,
        delay: `${Math.random() * 8}s`,
        h: `${40 + Math.random() * 80}px`,
        w: `${2 + Math.random() * 2}px`,
      })), [count]);
      return <>{drips.map((d, i) => <div key={i} className="blood-drip" style={{ left: d.left, width: d.w, '--dur': d.dur, '--delay': d.delay, '--drip-h': d.h }} />)}</>;
    }

    // ===== FogOverlay Component =====
    function FogOverlay() {
      return (
        <>
          <div className="fog-layer" style={{ height: '35vh', '--fog-dur': '14s' }} />
          <div className="fog-layer" style={{ height: '25vh', '--fog-dur': '10s', opacity: 0.1 }} />
        </>
      );
    }

    // ===== ParticleBurst Component =====
    function ParticleBurst({ active }) {
      const particles = useMemo(() => active ? Array.from({ length: 20 }, (_, i) => {
        const angle = (i / 20) * Math.PI * 2;
        const dist = 60 + Math.random() * 100;
        return {
          px: `${Math.cos(angle) * dist}px`,
          py: `${Math.sin(angle) * dist}px`,
          dur: `${0.6 + Math.random() * 0.8}s`,
          delay: `${Math.random() * 0.3}s`,
          color: ['#ff0000', '#ff4444', '#ffaa00', '#ff6600', '#ffffff'][Math.floor(Math.random() * 5)],
          size: `${3 + Math.random() * 5}px`,
        };
      }) : [], [active]);
      if (!active) return null;
      return <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-[200]">
        {particles.map((p, i) => <div key={i} className="particle" style={{ '--px': p.px, '--py': p.py, '--p-dur': p.dur, '--p-delay': p.delay, background: p.color, width: p.size, height: p.size }} />)}
      </div>;
    }

    // ===== Toast Component สำหรับแจ้งเตือน =====
    function Toast({ message, type, onClose }) {
      const [exiting, setExiting] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => {
          setExiting(true);
          setTimeout(onClose, 400);
        }, 4000);
        return () => clearTimeout(timer);
      }, [onClose]);

      const bgColor = type === 'error' ? 'bg-red-900/95' : type === 'warn' ? 'bg-amber-900/95' : 'bg-emerald-900/95';
      const icon = type === 'error' ? '⚠️' : type === 'warn' ? '⏳' : '✅';

      return (
        <div className={`fixed top-4 left-1/2 z-[200] ${bgColor} text-white px-6 py-3 rounded-xl shadow-2xl border border-white/10 backdrop-blur-md flex items-center gap-3 max-w-[90vw] ${exiting ? 'toast-exit' : 'toast-enter'}`}>
          <span className="text-xl">{icon}</span>
          <span className="text-sm font-medium">{message}</span>
        </div>
      );
    }

    // ===== Global lock ป้องกัน resetGame ถูกเรียกพร้อมกันจากหลาย client =====
    let isCreatingRoom = false;

    function App() {
      const [user, setUser] = useState(null);
      const [gameState, setGameState] = useState(null);
      const [loading, setLoading] = useState(true);
      const [introStage, setIntroStage] = useState('arrival');
      const [hasEntered, setHasEntered] = useState(false);

      const [isShuffling, setIsShuffling] = useState(false);
      const [isFlipping, setIsFlipping] = useState(false);
      const [isFullyFlipped, setIsFullyFlipped] = useState(false);
      const [isDimming, setIsDimming] = useState(false);
      const [justDrawn, setJustDrawn] = useState(false);
      const [spotlightPos, setSpotlightPos] = useState({ x: 50, y: 50 });

      const [aiInsight, setAiInsight] = useState("");
      const [isGeneratingAI, setIsGeneratingAI] = useState(false);
      const [aiError, setAiError] = useState("");

      // ===== 3D Card State =====
      const [cardTilt, setCardTilt] = useState({ rotateX: 0, rotateY: 0, scale: 1 });
      const [isHoveringCard, setIsHoveringCard] = useState(false);
      const cardContainerRef = useRef(null);

      const handleCardMouseMove = useCallback((e) => {
        if (!cardContainerRef.current) return;
        if (isFlipping && !isFullyFlipped) return;
        const rect = cardContainerRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        // Increase limits to make it more obvious (e.g., 30 degrees instead of 15)
        const rotateX = ((y - centerY) / centerY) * -30;
        const rotateY = ((x - centerX) / centerX) * 30;
        setCardTilt({ rotateX, rotateY, scale: 1.1 });
      }, [isFlipping, isFullyFlipped]);

      const handleCardMouseLeave = useCallback(() => {
        setIsHoveringCard(false);
        setCardTilt({ rotateX: 0, rotateY: 0, scale: 1 });
      }, []);

      const handleCardMouseEnter = useCallback(() => {
        if (!isFlipping || isFullyFlipped) setIsHoveringCard(true);
      }, [isFlipping, isFullyFlipped]);

      // ===== NEW: ชื่อผู้เล่น, คู่มือ, โหวต, Timer =====
      const [playerName, setPlayerName] = useState('');
      const [nameSubmitted, setNameSubmitted] = useState(false);
      const [showGuide, setShowGuide] = useState(false);
      const [showRules, setShowRules] = useState(false);
      const [timerLeft, setTimerLeft] = useState(0);
      const [showVotePanel, setShowVotePanel] = useState(false);
      const [myVote, setMyVote] = useState(null);

      const [toast, setToast] = useState(null);
      const showToast = useCallback((message, type = 'error') => {
        setToast({ message, type, key: Date.now() });
      }, []);

      const drawLockRef = useRef(false);
      const resetLockRef = useRef(false);
      const shuffleTimerRef = useRef(null);
      const gameStateRef = useRef(null);
      const timerIntervalRef = useRef(null);

      const myCard = useMemo(() => gameState?.cards?.find(c => c.drawnBy === user?.uid), [gameState, user]);
      const isHost = useMemo(() => gameState?.hostUid === user?.uid, [gameState, user]);
      const players = useMemo(() => gameState?.players || {}, [gameState]);
      const playerCount = useMemo(() => Object.values(players).filter(p => !p.isSpectator).length, [players]);
      const spectatorCount = useMemo(() => Object.values(players).filter(p => p.isSpectator).length, [players]);
      const isSpectator = useMemo(() => players[user?.uid]?.isSpectator === true, [players, user]);
      const votes = useMemo(() => gameState?.votes || {}, [gameState]);
      const voteCount = useMemo(() => Object.keys(votes).length, [votes]);
      const stats = useMemo(() => {
        if (!gameState?.cards) return { drawn: 0, left: 0, total: 0 };
        const drawnCount = gameState.cards.filter(c => c.isDrawn).length;
        const total = gameState.cards.length;
        return { drawn: drawnCount, left: total - drawnCount, total };
      }, [gameState]);

      // ===== Settings (UV, Deck) =====
      const [uvMode, setUvMode] = useState(false);
      const [joinAsSpectator, setJoinAsSpectator] = useState(false);
      const [currentRoomId, setCurrentRoomId] = useState('');
      const [inputRoomId, setInputRoomId] = useState('');

      const joinRoom = useCallback(async (e) => {
        if (e) e.preventDefault();
        const rid = inputRoomId.trim().toUpperCase();
        if (!rid) return;
        setLoading(true);
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', rid);
          const checkSnap = await getDoc(gameDocRef);
          if (!checkSnap.exists()) {
            await setDoc(gameDocRef, {
              cards: [], status: 'setup', createdAt: new Date().toISOString(), version: Date.now(),
              hostUid: user.uid, players: {}, votes: {}, timer: { isRunning: false, endTime: 0 }
            });
          }
          setCurrentRoomId(rid);
        } catch (error) {
          console.error('Join room error:', error);
          showToast('ไม่สามารถเชื่อมต่อห้องได้', 'error');
        }
        setLoading(false);
      }, [user, inputRoomId, showToast]);
      const [hostDeckConfig, setHostDeckConfig] = useState([...ROLE_TEMPLATES]);
      const totalConfiguredCards = useMemo(() => hostDeckConfig.reduce((acc, c) => acc + c.count, 0), [hostDeckConfig]);

      const updateHostDeckConfig = (index, change) => {
        const newConf = [...hostDeckConfig];
        newConf[index].count = Math.max(0, newConf[index].count + change);
        setHostDeckConfig(newConf);
      };

      const startGame = async () => {
        if (!isHost || !user) return;
        if (totalConfiguredCards < playerCount) {
          showToast(`จำนวนการ์ด (${totalConfiguredCards}) มองไม่พอสำหรับผู้เล่น (${playerCount})`, 'error');
          return;
        }
        setLoading(true);
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
          const newDeck = generateDeck(hostDeckConfig);
          await updateDoc(gameDocRef, {
            cards: newDeck,
            status: 'playing',
            version: Date.now()
          });
        } catch (e) {
          console.error('Start game error:', e);
          showToast('เริ่มเกมไม่สำเร็จ: ' + e.message, 'error');
        }
        setLoading(false);
      };

      // ===== Timer countdown sync =====
      useEffect(() => {
        if (timerIntervalRef.current) clearInterval(timerIntervalRef.current);
        if (!gameState?.timer?.endTime || !gameState?.timer?.isRunning) { setTimerLeft(0); return; }
        const tick = () => {
          const left = Math.max(0, Math.floor((gameState.timer.endTime - Date.now()) / 1000));
          setTimerLeft(left);
          if (left <= 0 && timerIntervalRef.current) clearInterval(timerIntervalRef.current);
        };
        tick();
        timerIntervalRef.current = setInterval(tick, 1000);
        return () => { if (timerIntervalRef.current) clearInterval(timerIntervalRef.current); };
      }, [gameState?.timer]);

      // ล้างสถานะอนิเมชันทันที หากโดนรีเซ็ตการ์ด (ป้องกันจอมืด/เด้งค้าง)
      useEffect(() => {
        if (!myCard) {
          setIsFlipping(false);
          setIsFullyFlipped(false);
          setIsDimming(false);
          setJustDrawn(false);
          setAiInsight("");
          setAiError("");
          setIsGeneratingAI(false);
          setIsShuffling(false);
          // Clear shuffle timer ถ้ามี
          if (shuffleTimerRef.current) {
            clearTimeout(shuffleTimerRef.current);
            shuffleTimerRef.current = null;
          }
          // ปลดล็อคเพื่อให้กดได้ใหม่
          drawLockRef.current = false;
        }
      }, [myCard]);

      // Cleanup shuffle timer on unmount
      useEffect(() => {
        return () => {
          if (shuffleTimerRef.current) {
            clearTimeout(shuffleTimerRef.current);
          }
        };
      }, []);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else { await signInAnonymously(auth); }
            setLoading(false);
          } catch (error) {
            console.error("Auth Error:", error);
            showToast("เข้าสู่ระบบไม่สำเร็จ กรุณารีเฟรชหน้า", "error");
            setLoading(false);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, u => {
          setUser(u);
          if (u) setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !currentRoomId) return;
        const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
        const unsubscribe = onSnapshot(gameDocRef, (docSnap) => {
          try {
            if (docSnap.exists()) {
              const newData = docSnap.data();
              // เปรียบเทียบ version ก่อน → ถ้าเหมือนเดิมไม่ต้อง re-render
              const prevVersion = gameStateRef.current?.version;
              const prevDrawn = gameStateRef.current?.cards?.filter(c => c.isDrawn).length;
              const newDrawn = newData?.cards?.filter(c => c.isDrawn).length;
              if (prevVersion === newData?.version && prevDrawn === newDrawn) return;
              gameStateRef.current = newData;
              setGameState(newData);
              setLoading(false);
            } else {
              // ===== ป้องกัน reset storm: ตรวจก่อนว่ามีคนกำลังสร้างอยู่หรือยัง =====
              if (!isCreatingRoom) {
                isCreatingRoom = true;
                initRoom().finally(() => {
                  // ปลดล็อคหลัง 3 วินาที ป้องกันหลายคนสร้างพร้อมกัน
                  setTimeout(() => { isCreatingRoom = false; }, 3000);
                });
              }
            }
          } catch (err) {
            console.error("onSnapshot handler error:", err);
          }
        }, (error) => {
          console.error("Firestore listener error:", error);
          // ไม่ต้อง toast ซ้ำถ้ามี toast อยู่แล้ว
          if (!toast) showToast("การเชื่อมต่อขัดข้อง กำลังพยายามใหม่...", "warn");
        });
        return () => unsubscribe();
      }, [user, currentRoomId]);

      useEffect(() => {
        if (introStage === 'arrival') {
          const timer = setTimeout(() => setIntroStage('blackout'), 3200);
          return () => clearTimeout(timer);
        } else if (introStage === 'blackout') {
          const timer = setTimeout(() => setIntroStage('ready'), 1000);
          return () => clearTimeout(timer);
        }
      }, [introStage]);

      // Mouse & Particle Trail
      useEffect(() => {
        const canvas = document.getElementById('blood-trail');
        let ctx = null, frameId;
        if (canvas) {
          ctx = canvas.getContext('2d');
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        let particles = [];

        const resize = () => { if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } };
        window.addEventListener('resize', resize);

        const addParticle = (x, y) => {
          if (!ctx || Math.random() > 0.6) return;
          particles.push({
            x, y, size: Math.random() * 5 + 1.5,
            opacity: 0.8, speedY: Math.random() * 1.5 + 0.5
          });
        };

        const handleMove = (e) => {
          const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
          const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
          setSpotlightPos({ x: (clientX / window.innerWidth) * 100, y: (clientY / window.innerHeight) * 100 });
          addParticle(clientX, clientY);
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, { passive: true });

        const animate = () => {
          if (!ctx) return;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            ctx.fillStyle = `rgba(180, 0, 0, ${p.opacity})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            p.y += p.speedY;
            p.opacity -= 0.02;
          }
          particles = particles.filter(p => p.opacity > 0);
          frameId = requestAnimationFrame(animate);
        };
        animate();

        return () => {
          window.removeEventListener('resize', resize);
          window.removeEventListener('mousemove', handleMove);
          window.removeEventListener('touchmove', handleMove);
          cancelAnimationFrame(frameId);
        };
      }, [hasEntered, nameSubmitted]);

      const fetchAIInsight = async (role, story) => {
        if (isGeneratingAI) return;
        setIsGeneratingAI(true); setAiError(""); setAiInsight("");
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: `บทบาท: ${role}\nเรื่องราว: ${story}\nช่วยวิเคราะห์จิตวิทยาและวิธีเล่นบทบาทนี้ให้เนียนที่สุดในฐานะผู้คุมเกมสไตล์ Noir` }] }], systemInstruction: { parts: [{ text: "วิเคราะห์จิตวิทยาตัวละครสั้นๆ ภาษาไทย" }] } })
          });
          const result = await response.json();
          setAiInsight(result.candidates?.[0]?.content?.parts?.[0]?.text || "ข้อมูลสูญหาย...");
        } catch (err) { setAiError("สัญญาณขัดข้อง..."); }
        finally { setIsGeneratingAI(false); }
      };

      // ===== ลงทะเบียนผู้เล่น =====
      const registerPlayer = useCallback(async (nameStr) => {
        if (!user || !nameStr.trim() || !currentRoomId) return;
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
          await updateDoc(gameDocRef, {
            [`players.${user.uid}`]: { name: nameStr.trim(), joinedAt: Date.now(), isSpectator: joinAsSpectator }
          });
          setNameSubmitted(true);
        } catch (e) { console.error('Register error:', e); showToast('ลงทะเบียนไม่สำเร็จ', 'error'); }
      }, [user, joinAsSpectator, showToast, currentRoomId]);

      // ===== Host: เริ่ม/หยุด Timer =====
      const toggleTimer = useCallback(async (durationMinutes = 5) => {
        if (!user || !isHost || !currentRoomId) return;
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
          if (gameState?.timer?.isRunning) {
            await updateDoc(gameDocRef, { timer: { isRunning: false, endTime: 0 } });
          } else {
            await updateDoc(gameDocRef, { timer: { isRunning: true, endTime: Date.now() + durationMinutes * 60000, duration: durationMinutes } });
          }
        } catch (e) { console.error('Timer error:', e); }
      }, [user, isHost, gameState, currentRoomId]);

      // ===== โหวต =====
      const submitVote = useCallback(async (targetName) => {
        if (!user || !targetName || !currentRoomId) return;
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
          await updateDoc(gameDocRef, { [`votes.${user.uid}`]: targetName });
          setMyVote(targetName);
          showToast(`โหวต "${targetName}" เรียบร้อย`, 'success');
        } catch (e) { console.error('Vote error:', e); }
      }, [user, showToast, currentRoomId]);

      // ===== Host: ล้างโหวต =====
      const clearVotes = useCallback(async () => {
        if (!user || !isHost || !currentRoomId) return;
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
          await updateDoc(gameDocRef, { votes: {} });
          setMyVote(null);
        } catch (e) { console.error('Clear votes error:', e); }
      }, [user, isHost, currentRoomId]);

      // ===== คืนไพ่ =====
      const returnCard = useCallback(async () => {
        if (!user || !myCard || !currentRoomId) return;
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
          await runTransaction(db, async (transaction) => {
            const snap = await transaction.get(gameDocRef);
            if (!snap.exists()) return;
            const data = snap.data();
            const updatedCards = data.cards.map(c => c.drawnBy === user.uid ? { ...c, isDrawn: false, drawnBy: null } : { ...c });
            transaction.update(gameDocRef, { cards: updatedCards });
          });
          showToast('คืนไพ่เรียบร้อยแล้ว', 'success');
        } catch (e) { console.error('Return card error:', e); }
      }, [user, myCard, showToast, currentRoomId]);

      // ===== initRoom =====
      const initRoom = useCallback(async () => {
        if (!user || !currentRoomId) return;
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
          const checkSnap = await getDoc(gameDocRef);
          if (checkSnap.exists()) { setLoading(false); return; }
          await setDoc(gameDocRef, {
            cards: [], status: 'setup', createdAt: new Date().toISOString(), version: Date.now(),
            hostUid: user.uid, players: {}, votes: {}, timer: { isRunning: false, endTime: 0 }
          });
        } catch (error) { console.error('Init room error:', error); }
        finally { setLoading(false); }
      }, [user, currentRoomId]);

      // ===== resetGame =====
      const resetGame = useCallback(async () => {
        if (!user) return;
        if (resetLockRef.current) return;
        resetLockRef.current = true;

        setLoading(true);
        try {
          const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
          await updateDoc(gameDocRef, {
            cards: [],
            votes: {},
            status: 'setup',
            version: Date.now()
          });
        } catch (error) {
          console.error("Reset Error:", error);
          showToast("รีเซ็ตเกมไม่สำเร็จ กรุณาลองใหม่", "error");
        } finally {
          setLoading(false);
          setTimeout(() => { resetLockRef.current = false; }, 3000);
        }
      }, [user, showToast, currentRoomId]);

      // ===== handleDrawWithAnimation: เพิ่ม retry + lock ที่แข็งแกร่งขึ้น =====
      const handleDrawWithAnimation = useCallback(async () => {
        // Guard: ป้องกันกดซ้ำด้วย Ref (ไม่ขึ้นกับ React re-render)
        if (!user || drawLockRef.current || myCard) return;
        drawLockRef.current = true;
        setIsShuffling(true);

        const MAX_RETRIES = 5;
        let retryCount = 0;
        let success = false;

        while (retryCount < MAX_RETRIES && !success) {
          try {
            const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);

            await runTransaction(db, async (transaction) => {
              const docSnap = await transaction.get(gameDocRef);
              if (!docSnap.exists()) throw new Error("NO_ROOM");

              const currentData = docSnap.data();
              if (!currentData || !currentData.cards) throw new Error("CORRUPT_DATA");

              // ตรวจสอบเพื่อป้องกันการกดย้ำหรือถ้าเรามีการ์ดอยู่แล้ว
              if (currentData.cards.find(c => c.drawnBy === user.uid)) {
                // เรามีการ์ดแล้ว — ให้ถือว่าสำเร็จ ไม่ต้อง update
                success = true;
                return;
              }

              const idx = currentData.cards.findIndex(c => !c.isDrawn);
              if (idx === -1) throw new Error("NO_CARDS_LEFT");

              // Deep Copy เพื่อป้องกัน State Mutate ตอน Transaction ตีกัน
              const updatedCards = currentData.cards.map(c => ({ ...c }));
              updatedCards[idx].isDrawn = true;
              updatedCards[idx].drawnBy = user.uid;

              transaction.update(gameDocRef, { cards: updatedCards });
            });

            success = true;
          } catch (error) {
            retryCount++;

            // ข้อผิดพลาดที่ไม่ต้อง retry
            if (error.message === "NO_ROOM") {
              showToast("ไม่พบห้องเกม กรุณารีเฟรชหน้า", "error");
              break;
            }
            if (error.message === "NO_CARDS_LEFT") {
              showToast("การ์ดหมดแล้ว! รอ Host รีเซ็ตเกม", "warn");
              break;
            }
            if (error.message === "CORRUPT_DATA") {
              showToast("ข้อมูลเกมขัดข้อง กรุณารีเฟรช", "error");
              break;
            }

            // Firestore Transaction contention — retry ด้วย exponential backoff
            if (retryCount < MAX_RETRIES) {
              const backoff = Math.min(200 * Math.pow(2, retryCount) + Math.random() * 100, 3000);
              console.warn(`Transaction retry ${retryCount}/${MAX_RETRIES}, backoff ${Math.round(backoff)}ms`);
              await new Promise(resolve => setTimeout(resolve, backoff));
            } else {
              console.error("Transaction failed after max retries:", error);
              showToast("เซิร์ฟเวอร์หนาแน่น กรุณาลองใหม่อีกครั้ง", "error");
            }
          }
        }

        if (success) {
          playSound('heartbeat');
          vibrate([100, 50, 100, 50, 200]);
          // เมื่อจองการ์ดในระบบเสร็จสมบูรณ์ ค่อยแสดงอนิเมชันสับไพ่
          shuffleTimerRef.current = setTimeout(() => {
            setIsShuffling(false);
            setJustDrawn(true);
            drawLockRef.current = false;
            shuffleTimerRef.current = null;
          }, 2500);
        } else {
          // ถ้า fail ให้ปลดล็อคทันที
          setIsShuffling(false);
          drawLockRef.current = false;
        }
      }, [user, myCard, showToast, currentRoomId]);

      // ===== หน้า Intro =====

                </button>
              </form>
            </div>
            {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

      // ===== หน้าตั้งชื่อผู้เล่น =====
      if (!nameSubmitted) {

          <div className="min-h-screen relative flex flex-col items-center justify-center bg-black p-4">

            <FogOverlay />

          </div>

      // ===== หน้าจัดชุดไพ่ (Setup Phase) =====
      if (gameState?.status === 'setup') {

            <FogOverlay />

              <div className="bg-[#050505] border border-red-900/30 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-5 sm:p-8 text-sm text-gray-300 font-serif leading-relaxed shadow-[0_0_40px_rgba(220,38,38,0.1)]" onClick={e => e.stopPropagation()}>

                <div className="space-y-6">
                  <section>
                    <h4 className="text-red-400 font-bold mb-3 uppercase tracking-widest text-xs border-l-2 border-red-500 pl-2">📖 เนื้อเรื่องจำลอง (Storyline)</h4>
                    <p className="bg-red-950/20 p-4 border border-red-900/30 rounded-lg italic text-gray-400 leading-relaxed">

                    </p>
                    <div className="mt-3 bg-black p-4 rounded-lg border border-gray-800">
                      <p className="text-[10px] font-mono text-gray-500 uppercase tracking-widest mb-2 border-b border-gray-800 pb-1">ข้อมูลจากกองพิสูจน์หลักฐาน</p>
                      <ul className="space-y-2 text-xs">
                        <li><span className="text-red-500 font-bold">🩸 เลือดของผู้ตาย:</span> กรุ๊ป B</li>
                        <li><span className="text-red-500 font-bold">🩸 เลือดของคนร้าย:</span> กรุ๊ป O <span className="text-gray-500 italic">(ไม่ตกตะกอนกับน้ำยาทั้งคู่)</span></li>
                        <li className="pt-2 mt-2 border-t border-gray-800"><span className="text-purple-400 font-bold">🤫 ข้อมูลลับเพิ่มเติม:</span> มีรอยเลือดของ "คนสมรู้ร่วมคิด" หยดอยู่ด้วย เป็น เลือดกรุ๊ป AB</li>
                      </ul>
                    </div>
                  </section>

                  <section>
                    <h4 className="text-cyan-400 font-bold mb-3 uppercase tracking-widest text-xs border-l-2 border-cyan-500 pl-2">🎭 บทบาท (Roles & Skills)</h4>

                        ขอ GM ตรวจเลือดใครก็ได้ 1 ครั้ง/รอบ (ห้ามพูดชื่อกรุ๊ปเลือดตรงๆ ต้องบอกเป็นอาการตีความ เช่น <span className="italic text-gray-500">"ฉันหยดยาแล้วไม่ตกตะกอนเลย"</span>)
                      </div>
                      <div className="bg-amber-900/10 p-3 rounded border border-amber-900/30">
                        <strong className="text-amber-400 block mb-1">👁️ ผู้เห็นเหตุการณ์ (เปิดเผยตัวได้)</strong>
                        รู้ว่าคนร้ายกรุ๊ปเลือดอะไรตั้งแต่เริ่ม ห้ามพูดเด็ดขาด! ตอบคำถามเพื่อนได้ 1 ข้อ ด้วยวิธีพยักหน้า/ส่ายหน้าเท่านั้น
                      </div>
                      <div className="bg-blue-900/10 p-3 rounded border border-blue-900/30">
                        <strong className="text-blue-400 block mb-1">🕵️ นักสืบ</strong>
                        แอบทักแชท/กระซิบถามลักษณะคนร้ายจาก GM ได้ 1 ครั้ง/รอบ (ถ้ามีนักสืบหลายคน ให้ตกลงกันว่ารอบนี้ใครจะเป็นตัวแทนถาม)
                      </div>
                      <div className="bg-gray-800/30 p-3 rounded border border-gray-700/50">
                        <strong className="text-emerald-400 block mb-1">🧑‍🌾 ชาวบ้าน / 👤 ผู้ต้องสงสัย</strong>

                    </div>
                  </section>

                  <section>
                    <h4 className="text-purple-400 font-bold mb-3 uppercase tracking-widest text-xs border-l-2 border-purple-500 pl-2">🎮 วิธีการเล่น (Phases)</h4>

                      <li className="flex gap-3 items-start"><span className="text-purple-500 font-black mt-0.5">1.</span> <div><strong className="text-gray-200">เฟสกลางคืน (Night):</strong> GM จะสั่งทุกคนหลับตา จากนั้นเรียก <span className="text-red-400">ผู้ร้าย</span> ลืมตามาชี้คนตาย 1 คน และเรียก <span className="text-purple-400">ผู้สมรู้ร่วมคิด</span> ลืมตามาชี้คนที่จะถูกปิดปาก 1 คน (ห้ามพูดในรอบต่อไป)</div></li>
                      <li className="flex gap-3 items-start"><span className="text-purple-500 font-black mt-0.5">2.</span> <div><strong className="text-gray-200">เฟสกลางวัน (Day):</strong> GM ประกาศคนตายและคนถูกใบ้ จากนั้นเริ่มจับเวลาสืบสวน (5-10 นาที) ถกเถียงกันว่าใครน่าสงสัย</div></li>
                      <li className="flex gap-3 items-start"><span className="text-purple-500 font-black mt-0.5">3.</span> <div><strong className="text-gray-200">การใช้สกิล:</strong> ระหว่างถกเถียง แพทย์สามารถประกาศตัวขอตรวจเลือดได้ และนักสืบสามารถแอบถามรูปพรรณจาก GM ได้</div></li>

                    </ul>
                  </section>

                <button onClick={() => setShowRules(false)} className="w-full mt-8 bg-red-900/80 hover:bg-red-800 text-white py-4 rounded-xl font-bold tracking-[0.2em] uppercase text-sm border border-red-500/50 transition-all glow-pulse">I UNDERSTAND</button>
              </div>
            </div>

                <h3 className="text-xl font-black text-red-600 tracking-widest text-center mb-2 uppercase">🗳️ Vote</h3>
                <p className="text-gray-500 text-center text-xs font-mono mb-5">VOTES: {voteCount} / {playerCount}</p>
                {Object.entries(players).filter(([uid]) => uid !== user?.uid).map(([uid, p]) => (
                  <button key={uid} onClick={() => { submitVote(p.name); setShowVotePanel(false); }}
                    className={`w-full mb-2 py-3 px-5 rounded-xl border text-left font-bold transition-all ${myVote === p.name ? 'bg-red-900 border-red-500 text-white' : 'bg-gray-900 border-gray-700 text-gray-300 hover:border-red-600'}`}>
                    <span className="text-sm">🔍 {p.name}</span>
                  </button>
                ))}
                {isHost && <button onClick={() => { clearVotes(); setShowVotePanel(false); }} className="w-full mt-3 bg-amber-900/50 hover:bg-amber-800 text-amber-200 py-2 rounded-xl text-xs font-bold tracking-widest uppercase">🔄 Reset Votes (Host)</button>}
                <button onClick={() => setShowVotePanel(false)} className="w-full mt-2 bg-gray-800 hover:bg-gray-700 text-white py-3 rounded-xl font-bold tracking-widest uppercase text-sm">Close</button>
              </div>
            </div>
          )}

          <div className="max-w-3xl w-full mx-auto space-y-4 relative z-20 flex-1 flex flex-col pb-20">
            {/* ===== CASE STATUS + Player Count + Timer ===== */}
            <div className={`bg-black/85 p-5 rounded-2xl border-t-4 border-red-900 shadow-[0_10px_40px_rgba(0,0,0,0.8)] transition-opacity duration-1000 ${isDimming ? 'opacity-30' : 'opacity-100'}`}>
              <div className="flex flex-col sm:flex-row justify-between items-center gap-3">
                <div className="text-center sm:text-left">
                  <h2 className="text-gray-100 text-lg font-black tracking-widest flex items-center gap-2"><span className="text-red-600 animate-pulse">🩸</span> CASE STATUS</h2>
                  <p className="text-gray-400 text-xs font-mono mt-1 uppercase">Cards: {stats.drawn}/{stats.total} | 👥 Agents: {playerCount} {spectatorCount > 0 && `| 👁️‍🗨️ Specs: ${spectatorCount}`} {isSpectator && <span className="text-blue-400">| 👁️‍🗨️ YOU</span>} {isHost && <span className="text-amber-400">| ⭐ HOST</span>}</p>
                </div>
                <div className="flex gap-2 flex-wrap justify-center">
                  <button onClick={() => { setUvMode(!uvMode); vibrate(50); }} className={`text-[10px] font-bold tracking-widest px-3 py-2 rounded-full uppercase transition-colors ${uvMode ? 'bg-[#540099] text-white shadow-[0_0_15px_#540099]' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>🔦 UV</button>
                  <button onClick={() => setShowRules(true)} className="text-[10px] font-bold tracking-widest bg-emerald-950 hover:bg-emerald-900 border border-emerald-800 px-3 py-2 rounded-full uppercase text-emerald-100 shadow-md">📖 Rules</button>
                  <button onClick={() => setShowGuide(true)} className="text-[10px] font-bold tracking-widest bg-blue-950 hover:bg-blue-900 border border-blue-800 px-3 py-2 rounded-full uppercase">📋 Guide</button>
                  <button onClick={() => setShowVotePanel(true)} className="text-[10px] font-bold tracking-widest bg-purple-950 hover:bg-purple-900 border border-purple-800 px-3 py-2 rounded-full uppercase">🗳️ Vote {voteCount > 0 && `(${voteCount})`}</button>
                  {myCard && <button onClick={returnCard} className="text-[10px] font-bold tracking-widest bg-gray-800 hover:bg-gray-700 border border-gray-600 px-3 py-2 rounded-full uppercase">↩️ Return</button>}
                  {isHost && <button onClick={resetGame} className="text-[10px] font-bold tracking-widest bg-red-950 hover:bg-red-900 border border-red-800 px-3 py-2 rounded-full uppercase">🔄 Reset</button>}
                </div>
              </div>
              {/* Timer bar */}
              {timerLeft > 0 && (
                <div className="mt-3">
                  <div className="flex justify-between items-center mb-1">
                    <span className="text-[10px] font-mono text-red-400 uppercase tracking-widest">⏱️ Meeting Timer</span>
                    <span className={`text-lg font-black font-mono ${timerLeft <= 30 ? 'text-red-500 animate-pulse' : 'text-white'}`}>{Math.floor(timerLeft / 60)}:{String(timerLeft % 60).padStart(2, '0')}</span>
                  </div>
                  <div className="w-full bg-gray-800 rounded-full h-1.5 overflow-hidden">
                    <div className="bg-red-600 h-full rounded-full transition-all duration-1000" style={{ width: `${(timerLeft / ((gameState?.timer?.duration || 5) * 60)) * 100}%` }}></div>
                  </div>
                </div>
              )}
              {/* Host Timer Controls */}
              {isHost && (
                <div className="mt-3 flex gap-2 flex-wrap">
                  {[3, 5, 10].map(m => (
                    <button key={m} onClick={() => toggleTimer(m)} className="text-[10px] font-mono bg-gray-800 hover:bg-gray-700 border border-gray-600 px-3 py-1.5 rounded-lg text-gray-300">
                      {gameState?.timer?.isRunning ? '⏹️ Stop' : `⏱️ ${m}min`}
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div className="flex-1 flex flex-col items-center justify-center py-6">
              {isSpectator ? (
                <div className="flex flex-col items-center p-8 bg-black/40 border border-white/5 rounded-3xl mt-12 w-full max-w-sm backdrop-blur-sm shadow-2xl animate-slide-up-in">
                  <div className="w-20 h-20 bg-blue-900/40 rounded-full flex items-center justify-center mb-6 border border-blue-500/30 glow-pulse">
                    <span className="text-4xl text-blue-300">👁️‍🗨️</span>
                  </div>
                  <h3 className="text-2xl font-black font-mono tracking-widest text-[#aaccff] mb-2 uppercase drop-shadow-[0_0_10px_rgba(100,150,255,0.5)]">Spectator</h3>
                  <p className="text-xs text-blue-200/50 text-center uppercase tracking-wider mb-8">Monitoring investigation...<br />Classified clearance.</p>

                  <div className="w-full bg-black/60 rounded-xl p-5 border border-gray-800">
                    <div className="flex justify-between items-center text-xs text-gray-400 font-mono tracking-widest mb-3">
                      <span>DRAWN CARDS</span>
                      <span className="text-red-400 font-bold">{stats.drawn}/{stats.total}</span>
                    </div>
                    <div className="flex gap-1 overflow-hidden h-3 bg-gray-900 rounded-full border border-white/5">
                      <div className="bg-gradient-to-r from-red-900 to-red-600 h-full rounded-full transition-all duration-1000 shadow-[0_0_10px_rgba(255,0,0,0.5)]" style={{ width: `${stats.total > 0 ? (stats.drawn / stats.total) * 100 : 0}%` }}></div>
                    </div>
                  </div>
                </div>
              ) : (!myCard || isShuffling) ? (
                <div className="flex flex-col items-center">
                  {isShuffling ? (
                    <div className="relative w-48 h-64 mb-10 flex items-center justify-center">
                      <div className="absolute inset-0 bg-[#2a1b0d] rounded-2xl border-2 border-[#5c4a38] shadow-2xl animate-shuffle-1 overflow-hidden crisp-image" style={{ backgroundImage: `url("https://i.postimg.cc/yNy79y33/creation_2471378801.png")`, backgroundSize: 'cover' }}></div>
                      <div className="absolute inset-0 bg-[#2a1b0d] rounded-2xl border-2 border-[#5c4a38] shadow-2xl animate-shuffle-2 overflow-hidden crisp-image" style={{ backgroundImage: `url("https://i.postimg.cc/yNy79y33/creation_2471378801.png")`, backgroundSize: 'cover' }}></div>
                      <div className="absolute z-20 text-white font-black text-[10px] tracking-[0.2em] bg-red-800/90 px-3 py-1.5 rounded uppercase border border-red-500/30">Analyzing...</div>
                    </div>
                  ) : (
                    <div className="w-28 h-28 bg-black rounded-full border-4 border-gray-800 flex items-center justify-center glow-pulse mb-10 overflow-hidden group card-float relative">
                      <div className="absolute inset-0 bg-red-600/10 animate-pulse"></div>
                      <span className="text-6xl group-hover:scale-110 transition-transform heartbeat">💉</span>
                      <div className="scan-line"></div>
                    </div>
                  )}
                  <button onClick={handleDrawWithAnimation} disabled={stats.left === 0 || isShuffling || drawLockRef.current} className="group relative bg-red-900 hover:bg-red-700 disabled:bg-gray-900 disabled:opacity-60 text-white px-10 py-6 rounded-3xl text-2xl font-black tracking-[0.2em] shadow-[0_10px_0_#4a0000] active:translate-y-2 transition-all border border-red-500 uppercase flex flex-col items-center disabled:cursor-not-allowed disabled:active:translate-y-0 glow-pulse z-40">
                    <span>{isShuffling ? 'In Progress...' : 'Scan Blood'}</span>
                    <span className="text-[10px] font-mono tracking-widest text-red-300 mt-2">(Biometric Scan)</span>
                  </button>
                </div>
              ) : (
                <div className="flex flex-col items-center w-full max-w-sm mx-auto relative">
                  <ParticleBurst active={isFlipping} />
                  <div className={`perspective-1000 w-full px-6 z-50 ${justDrawn && !isHoveringCard ? 'animate-slide-up-in card-float' : ''}`}>
                    <div
                      ref={cardContainerRef}
                      onMouseMove={handleCardMouseMove}
                      onMouseLeave={handleCardMouseLeave}
                      onMouseEnter={handleCardMouseEnter}
                      onClick={() => {
                        if (!isFlipping) {
                          playSound('flip'); vibrate([50, 50, 100]);
                          setIsDimming(true);
                          setTimeout(() => { playSound('glitch'); setIsFlipping(true); }, 1000);
                          setTimeout(() => setIsFullyFlipped(true), 3500);
                          setCardTilt({ rotateX: 0, rotateY: 0, scale: 1 });
                        }
                      }}
                      style={{
                        transform: (isFlipping && !isFullyFlipped)
                          ? 'rotateY(180deg)'
                          : (isFullyFlipped
                            ? `rotateX(${-cardTilt.rotateX}deg) rotateY(${180 + cardTilt.rotateY}deg) scale(${cardTilt.scale})`
                            : `rotateX(${cardTilt.rotateX}deg) rotateY(${cardTilt.rotateY}deg) scale(${cardTilt.scale})`),
                        transition: (isFlipping && !isFullyFlipped)
                          ? 'transform 2.5s cubic-bezier(0.4, 0, 0.2, 1)'
                          : (isHoveringCard ? 'transform 0.1s ease-out' : 'transform 0.5s ease-out'),
                        boxShadow: isHoveringCard && (!isFlipping || isFullyFlipped) ? `${-cardTilt.rotateY}px ${cardTilt.rotateX}px 40px rgba(220, 38, 38, 0.4)` : 'none'
                      }}
                      className={`relative w-full aspect-[2/3] transform-style-3d ${(!isFlipping || isFullyFlipped) ? 'cursor-pointer' : ''}`}>

                      {/* Glare effect - Back face (Hidden in UV) */}
                      {!isFullyFlipped && isHoveringCard && !uvMode && (
                        <div
                          className="absolute inset-0 pointer-events-none rounded-2xl z-[60]"
                          style={{
                            background: `radial-gradient(circle at ${(cardTilt.rotateY / 30 + 1) * 50}% ${(cardTilt.rotateX / -30 + 1) * 50}%, rgba(255,255,255,0.3) 0%, transparent 70%)`,
                            transition: 'background 0.1s ease-out'
                          }}
                        />
                      )}

                      <div className="absolute inset-0 w-full h-full backface-hidden rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.9)] border-2 border-[#5c4a38] bg-[#2a1b0d] flex flex-col items-center justify-center p-1 bg-cover bg-center overflow-hidden crisp-image transform-style-3d transition-colors" style={{ backgroundImage: `url("https://i.postimg.cc/yNy79y33/creation_2471378801.png")`, filter: uvMode ? 'hue-rotate(270deg) contrast(1.5)' : 'none' }}>

                        {/* UV Light hidden fingerprint */}
                        {uvMode && (
                          <div className="absolute top-[20%] right-[30%] opacity-40 text-purple-300 text-6xl rotate-45 pointer-events-none">👆</div>
                        )}

                        <div className="w-full h-full border border-white/5 flex flex-col items-center justify-center bg-black/35 backdrop-blur-[1px] rounded-xl p-3 text-center">
                          <div className="w-16 h-16 bg-black/40 rounded-full flex items-center justify-center mb-3 border border-white/10"><span className="text-4xl opacity-90 drop-shadow-lg">🩸</span></div>
                          <span className="text-base font-mono text-white font-black tracking-[0.3em] uppercase">Top Secret</span>
                          {!isFlipping && !isDimming && <span className="mt-10 bg-red-600/80 text-white px-5 py-1.5 rounded-full text-[10px] font-bold animate-pulse border border-white/20 tracking-[0.2em] uppercase text-center">Tap to Reveal</span>}
                        </div>
                      </div>
                      <div className={`absolute inset-0 w-full h-full backface-hidden rotate-y-180 rounded-2xl shadow-[0_0_60px_rgba(255,255,255,0.1)] border-4 flex flex-col overflow-hidden crisp-image ${myCard.color} border-[#0a0a0a] bg-cover bg-center transform-style-3d`} style={{ backgroundImage: `url("${myCard.image}")` }}>
                        {/* Glare effect - Front face */}
                        {isFullyFlipped && isHoveringCard && (
                          <div
                            className="absolute inset-0 pointer-events-none z-[60]"
                            style={{
                              // Invert rotateY for front face because local X axis is flipped by rotateY(180)
                              background: `radial-gradient(circle at ${(-cardTilt.rotateY / 30 + 1) * 50}% ${(cardTilt.rotateX / -30 + 1) * 50}%, rgba(255,255,255,0.2) 0%, transparent 70%)`,
                              transition: 'background 0.1s ease-out'
                            }}
                          />
                        )}
                        <div className="bg-white/95 text-black text-[10px] font-mono font-black text-center py-2.5 border-b-4 border-black tracking-[0.4em] z-10 uppercase">Identity Confirmed</div>
                        <div className="flex-1 flex flex-col items-end justify-end p-5 text-right bg-gradient-to-t from-black/90 via-black/30 to-transparent z-10">
                          <h3 className={`font-black text-3xl z-10 ${myCard.text} drop-shadow-[0_2px_4px_rgba(0,0,0,1)] tracking-wider uppercase`}>{myCard.role}</h3>
                          <div className="mt-3 text-[10px] font-mono text-white/90 bg-red-900/60 px-4 py-1.5 rounded-sm border border-red-500/30 backdrop-blur-sm tracking-widest uppercase">ID: #{myCard.drawnBy?.substring(0, 8)}</div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {isFlipping && (
                    <div className="w-full mt-8 bg-[#f2e5cf] text-gray-900 rounded-xl shadow-[0_15px_35px_rgba(0,0,0,0.6)] border border-[#d4c5ab] p-6 relative animate-slide-up overflow-hidden z-50">
                      <div className="absolute inset-0 overflow-hidden rounded-xl pointer-events-none opacity-60">
                        <div className="absolute top-0 left-[20%] w-2.5 h-12 bg-[#7a0000] rounded-b-full mix-blend-multiply"></div>
                        <div className="absolute top-10 left-[20.2%] w-2 h-2.5 bg-[#7a0000] rounded-full mix-blend-multiply animate-blood-drop-1"></div>
                      </div>
                      <div className="relative z-10">
                        <div className="flex items-center gap-3 border-b-2 border-red-900/20 pb-3 mb-5">
                          <div className="p-2 bg-red-900 rounded-lg text-white shadow-lg"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>
                          <h4 className="font-black text-red-950 font-mono tracking-widest uppercase text-lg text-center flex-1">Case Dossier</h4>
                        </div>
                        <div className="space-y-5">
                          <div className="bg-white/40 p-4 rounded-lg border border-white/20">
                            <span className="block text-[10px] font-black text-red-900 uppercase tracking-[0.25em] mb-2 font-mono">Confidential Profile</span>
                            <p className="text-base leading-relaxed font-serif text-gray-800 italic font-medium">"{myCard.story}"</p>
                          </div>
                          <div className="bg-red-900/10 rounded-lg p-4 border border-red-900/20 shadow-inner">
                            <span className="block text-[10px] font-black text-red-700 uppercase tracking-[0.25em] mb-2 font-mono">Designated Skill</span>
                            <p className="text-base font-bold text-gray-900 leading-snug">{myCard.skill}</p>
                          </div>
                          <div className="mt-6 pt-4 border-t border-red-900/10 text-center">
                            {!aiInsight && !isGeneratingAI && !aiError && (
                              <button onClick={() => fetchAIInsight(myCard.role, myCard.story)} className="w-full bg-red-950 hover:bg-red-900 text-red-100 py-3 rounded-lg border border-red-500/30 flex items-center justify-center gap-2 group active:scale-95 shadow-md">
                                <span className="group-hover:animate-spin">✨</span><span className="font-bold text-xs tracking-widest uppercase text-[10px]">วิเคราะห์ประวัติเชิงลึก</span>
                              </button>
                            )}
                            {isGeneratingAI && <div className="flex flex-col items-center gap-2 py-4 animate-pulse"><div className="flex gap-1"><div className="w-2 h-2 bg-red-900 rounded-full animate-bounce"></div><div className="w-2 h-2 bg-red-900 rounded-full animate-bounce [animation-delay:-.3s]"></div><div className="w-2 h-2 bg-red-900 rounded-full animate-bounce [animation-delay:-.5s]"></div></div><span className="text-[10px] font-mono text-red-900 uppercase tracking-widest">กำลังดึงข้อมูล...</span></div>}
                            {aiInsight && <div className="bg-black/5 p-4 rounded border border-red-900/5 mt-2 animate-fadeIn relative text-left"><div className="absolute top-2 right-2 text-red-900/20 text-xl">✨</div><span className="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 font-mono">Psychological Evaluation</span><p className="text-sm text-gray-700 font-serif italic leading-relaxed typing-effect">{aiInsight}</p></div>}
                            {aiError && <p className="text-[10px] text-red-700 text-center font-mono mt-2">{aiError}</p>}
                          </div>

                          <div className="mt-4 pt-4 border-t border-red-900/20">
                            <a href="https://blood-green.vercel.app/" target="_blank" rel="noopener noreferrer"
                              className={`w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl font-black text-[11px] md:text-xs uppercase tracking-widest transition-all shadow-lg border ${myCard.role === 'เทคนิคการแพทย์'
                                  ? 'bg-cyan-900 hover:bg-cyan-800 text-cyan-50 border-cyan-500/50 glow-pulse'
                                  : 'bg-gray-900 hover:bg-gray-800 text-gray-300 border-gray-700'
                                }`}>
                              <span>{myCard.role === 'เทคนิคการแพทย์' ? '🔬 เข้าสู่ห้องแล็บตรวจเลือด (ใช้ทักษะ)' : '🩸 ดูผลตรวจเลือดจากแล็บ (Medical Lab)'}</span>
                            </a>
                            {myCard.role === 'เทคนิคการแพทย์' && (
                              <p className="text-[9px] text-cyan-800 font-mono mt-2 text-center">** คุณคือผู้เดียวที่สามารถวิเคราะห์กรุ๊ปเลือดในสถานการณ์ฉุกเฉินได้ **</p>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>

</html>
